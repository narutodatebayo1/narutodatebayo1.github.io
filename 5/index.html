<body>

        <div style="display:none" id="pay">
            <button><a href="pay.html">bca</a></button><br>

    <script>
        function lock(event){
            if(event.target.style.backgroundColor == "red"){
                document.getElementById("text").innerHTML = "Locker number " + event.target.innerHTML + " is not available"
            } else if(event.target.style.backgroundColor == "green"){
                document.getElementById("text").innerHTML = "Locker number " + event.target.innerHTML + " is available<br>Please select your payment method"
                document.getElementById("pay").style.display = "block"
            }
        }
    </script>
