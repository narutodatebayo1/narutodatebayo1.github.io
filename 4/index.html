<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html{height:99%}
        body{
            height:99%; 
            user-select: none;
            background-color: #b8c6db;
            background-image: linear-gradient(315deg, #b8c6db 0%, #f5f7fa 100%);

        }
        .outer{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 99%;
        }
        .inner{
            width:450px;
            height:auto;
            border-radius: 5px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px 2px rgba(100, 100, 100, 0.1);

        }
        .theform{
            width:450px;
            height:45px;
            border-radius: 5px 5px 0 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .thebutton{
            width:450px;
            height:35px;
            border-radius:0 0 5px 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor:pointer;
            border:none;
            background-color: #9b36c6;
        }
        .thebutton:hover{
            background-color: #732d91;
        }
        .qa{
            display:inline-block;
            width: 370px;
            height:auto;
            position: relative;
        }
        .pointer{cursor:pointer}
        .question{
            font-size: 20px;
            font-weight: 600;
            font-family: 'Times New Roman', Times, serif;
            text-align: center;
        }
        .answer{
            width:370px;
            position:absolute;
            bottom:0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="outer">
        <div class="inner" id="inner">
            <div class="theform" id="theform">
                <div class="qa" id="qa">
                    <div class="question" id="ques">Press the Start button!</div>
                    <div class="answer" id="forms">
                         <form>
                            <input class="pointer" type="radio" id="ans1" name="question" required>
                            <label class="pointer" for="ans1" id="answ1"></label><br>
                            <input class="pointer" type="radio" id="ans2" name="question">
                            <label class="pointer" for="ans2" id="answ2"></label><br>
                            <input class="pointer" type="radio" id="ans3" name="question">
                            <label class="pointer" for="ans3" id="answ3"></label><br>
                            <input class="pointer" type="radio" id="ans4" name="question">
                            <label class="pointer" for="ans4" id="answ4"></label><br>
                        </form>
                    </div>
                </div>    
            </div>
            <button class="thebutton" onclick="theclick()" id="buton">
                Start
            </button>
        </div>
    </div>
    <script>
        var thequestion = [
            {
                answer: 1,
            },
            {
                prompt: "How old is Florin?",
                answer: 3,
                answer1: "10",
                answer2: "17",
                answer3: "26",
                answer4: "110",
            },
            {
                prompt: "What is the most used programming language in 2019?",
                answer: 4,
                answer1: "Java",
                answer2: "C",
                answer3: "Python",
                answer4: "Java Script",
            },
            {
                prompt: "Who is the President of US?",
                answer: 2,
                answer1: "Florin Pop",
                answer2: "Donald Trump",
                answer3: "Joko Widodo",
                answer4: "Vladimir Putin",
            },
            {
                prompt: "What does HTML stand for?",
                answer: 1,
                answer1: "Hypertext Markup Language",
                answer2: "Cascading Style Sheet",
                answer3: "Jason Object Notation",
                answer4: "Aku orang ganteng",
            },
            {
                prompt: "What year was Java Script launched?",
                answer: 2,
                answer1: "1996",
                answer2: "1995",
                answer3: "1994",
                answer4: "None of the above",
            },
        ]
        var i = 0;
        var score = 0;
        var gaje = thequestion.length - 1;
        
        function theclick(){
            if(document.getElementById("ans" + thequestion[i].answer).checked){
                score++;
                document.getElementById("ans" + thequestion[i].answer).checked = false;
            } else if(i == 5){
                document.getElementById("inner").style = "font-size: 20px; font-weight: 600; font-family: 'Times New Roman', Times, serif; text-align: center; display: flex; justify-content: center; align-items: center; padding:15px;";
                document.getElementById("inner").innerHTML = "You got " + score + "/" + gaje + " correct!";
                setTimeout(timeout,100)
            } else{
                document.getElementById("ans1").checked = false;
                document.getElementById("ans2").checked = false;
                document.getElementById("ans3").checked = false;
                document.getElementById("ans4").checked = false;
            };
            
            document.getElementById("forms").style.display = "block";
            document.getElementById("buton").innerHTML = "Submit";
            document.getElementById("qa").style.height = "150px";
            document.getElementById("theform").style.height = "265px";
            
            i++;
            document.getElementById("ques").innerHTML = thequestion[i].prompt;
            document.getElementById("answ1").innerHTML = thequestion[i].answer1;
            document.getElementById("answ2").innerHTML = thequestion[i].answer2;
            document.getElementById("answ3").innerHTML = thequestion[i].answer3;
            document.getElementById("answ4").innerHTML = thequestion[i].answer4;
        }
        function timeout(){
            if (confirm("Play again?")) {
                location.reload(true);
            } else {}
        }
    </script>
</body>
</html>
